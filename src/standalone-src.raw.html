<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--neutral-800); font-family: var(--font-body); }
  a { text-decoration: none; }
  image-slot { border-radius: inherit; }

  @media (max-width: 980px) {
    .twk-desktop-nav { gap: 14px !important; }
    .twk-desktop-nav a { display: none; }
    .hero-grid { grid-template-columns: 1fr !important; }
    .hero-portrait-col { min-height: 360px !important; order: -1; }
    .hero-portrait-col > div { margin: 0 0 8px !important; }
    .ueber-grid, .finalcta-grid { grid-template-columns: 1fr !important; }
    .methodik-grid { grid-template-columns: 1fr 1fr !important; }
    .grid-4 { grid-template-columns: 1fr 1fr !important; }
    .principle-row { grid-template-columns: 56px 1fr !important; }
    .principle-row p { grid-column: 2 !important; }
    .proof-logos { grid-template-columns: repeat(3, 1fr) !important; }
  }
  @media (max-width: 600px) {
    section { padding-left: 22px !important; padding-right: 22px !important; }
    section:not(#top) { padding-top: 76px !important; padding-bottom: 76px !important; }
    .grid-2, .grid-3, .grid-4, .methodik-grid, .footer-grid, .haltung-grid { grid-template-columns: 1fr !important; gap: 8px !important; }
    .tension-row { grid-template-columns: 1fr !important; gap: 6px !important; }
    .proof-logos { grid-template-columns: 1fr 1fr !important; }
  }

  @keyframes twk-marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .twk-logo-marquee { overflow: hidden; -webkit-mask-image: linear-gradient(to right, transparent, #000 7%, #000 93%, transparent); mask-image: linear-gradient(to right, transparent, #000 7%, #000 93%, transparent); }
  .twk-logo-track { display: flex; align-items: center; gap: 72px; width: max-content; animation: twk-marquee 45s linear infinite; }
  .twk-logo-marquee:hover .twk-logo-track { animation-play-state: paused; }
  @media (prefers-reduced-motion: reduce) { .twk-logo-track { animation: none; } }

  .twk-svc-card { transition: transform var(--dur-base) var(--ease-standard), box-shadow var(--dur-base) var(--ease-standard); }

<div id="root"></div>

<script type="text/babel">
  const { Button, Card, Badge, Input, Avatar, Switch } = window.TheWHYKINGSDesignSystem_57a775;
  window.Button = Button; window.Card = Card; window.Badge = Badge; window.Input = Input; window.Avatar = Avatar;

<script type="text/babel">
  const { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakToggle } = window;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "heroHeadline": "Klarheit",
    "accent": "Gold",
    "helm": true
  }/*EDITMODE-END*/;

  function buildAccent(name) {
    if (name === 'Sage') {
      return {
        main: 'var(--color-accent)', deep: 'var(--sage-600)', soft: 'var(--sage-50)',
        btn: 'primary', badge: 'sage',
        helm: window.R('assets/logos/helm-green.png'),
        helmWatermark: window.R('assets/logos/helm-green.png'),
        helmWhite: window.R('assets/logos/helm-white.png'),
      };
    }
    return {
      main: 'var(--color-gold)', deep: 'var(--gold-600)', soft: 'var(--gold-50)',
      btn: 'gold', badge: 'gold',
      helm: window.R('assets/logos/helm-gold.png'),
      helmWatermark: window.R('assets/logos/helm-gold.png'),
      helmWhite: window.R('assets/logos/helm-white.png'),
    };
  }

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const acc = buildAccent(t.accent);
    const {
      Header, Hero, Problem, Prinzipien, Angebote, Methodik, Haltung, Proof, UeberDominik, ThoughtLeadership, FinalCTA, Footer,
    } = window;

    const onNav = (id) => {
      const el = document.getElementById(id === 'top' ? 'top' : id);
      if (el) window.scrollTo({ top: id === 'top' ? 0 : el.offsetTop - 64, behavior: 'smooth' });
    };

    return (
      <React.Fragment>
        <Header onNav={onNav} acc={acc} />
        <Hero onNav={onNav} t={t} acc={acc} />
        <Problem acc={acc} />
        <Prinzipien acc={acc} />
        <Angebote acc={acc} />
        <Methodik acc={acc} />
        <Haltung acc={acc} />
        <Proof acc={acc} />
        <UeberDominik acc={acc} />
        <ThoughtLeadership acc={acc} />
        <FinalCTA acc={acc} />
        <Footer acc={acc} />

        <TweaksPanel>
          <TweakSection label="Hero" />
          <TweakRadio label="Headline" value={t.heroHeadline}
                      options={['Klarheit', 'Muster', 'Zumutung']}
                      onChange={(v) => setTweak('heroHeadline', v)} />
          <TweakSection label="Marke" />
          <TweakRadio label="Akzentfarbe" value={t.accent}
                      options={['Gold', 'Sage']}
                      onChange={(v) => setTweak('accent', v)} />
          <TweakToggle label="Helm-Wasserzeichen" value={t.helm}
                       onChange={(v) => setTweak('helm', v)} />
        </TweaksPanel>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
