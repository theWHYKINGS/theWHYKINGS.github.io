<style>
  html { scroll-behavior: smooth; overflow-x: hidden; }
  body { margin: 0; background: var(--neutral-800); font-family: var(--font-body); overflow-wrap: break-word; }
  a { text-decoration: none; }
  img { max-width: 100%; }
  image-slot { border-radius: inherit; }
  /* Lange Komposita nicht über den Rand schieben */
  .methodik-grid > div, .proof-metrics > div, .grid-3 > div, .tension-row > div { min-width: 0; }
  .methodik-grid h3, .proof-metrics > div { hyphens: auto; }

  /* Mobile-Navigation */
  .twk-mobile-toggle { display: none; }
  .twk-burger, .twk-burger::before, .twk-burger::after {
    content: ''; display: block; width: 22px; height: 2px; background: #fff; border-radius: 2px;
    transition: transform .25s var(--ease-standard), opacity .2s var(--ease-standard), background .1s var(--ease-standard);
  }
  .twk-burger { position: relative; }
  .twk-burger::before { position: absolute; top: -7px; left: 0; }
  .twk-burger::after { position: absolute; top: 7px; left: 0; }
  .twk-burger[data-open="true"] { background: transparent; }
  .twk-burger[data-open="true"]::before { transform: translateY(7px) rotate(45deg); }
  .twk-burger[data-open="true"]::after { transform: translateY(-7px) rotate(-45deg); }
  .twk-mobile-menu { display: none; }

  @media (max-width: 980px) {
    .twk-header { padding-left: 26px !important; padding-right: 26px !important; }
    .twk-desktop-nav { display: none !important; }
    .twk-mobile-toggle { display: inline-flex !important; }
    .twk-mobile-menu {
      display: flex; flex-direction: column;
      position: absolute; top: 100%; left: 0; right: 0;
      background: rgba(18,18,18,0.97);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.10);
      padding: 6px 26px 22px;
      transform: translateY(-8px); opacity: 0; pointer-events: none; visibility: hidden;
      transition: opacity .2s var(--ease-standard), transform .2s var(--ease-standard), visibility .2s;
    }
    .twk-mobile-menu[data-open="true"] { transform: translateY(0); opacity: 1; pointer-events: auto; visibility: visible; }

    .hero-grid { grid-template-columns: 1fr !important; gap: 4px !important; padding-left: 26px !important; padding-right: 26px !important; }
    .hero-portrait-col { min-height: 300px !important; order: -1; }
    .hero-portrait-col > div { margin: 20px 0 0 !important; }
    .hero-text { padding: 36px 0 64px !important; }
    .ueber-grid, .finalcta-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    .methodik-grid { grid-template-columns: 1fr 1fr !important; }
    .grid-3 { grid-template-columns: 1fr 1fr !important; }
    .haltung-grid { grid-template-columns: 1fr !important; gap: 20px !important; }
    .footer-grid { grid-template-columns: 1.4fr 1fr 1fr !important; gap: 28px 24px !important; }
    .principle-row { grid-template-columns: 52px 1fr !important; row-gap: 4px !important; }
    .principle-row h3 { grid-column: 2 !important; }
    .principle-row p { grid-column: 2 !important; }
  }
  @media (max-width: 600px) {
    section:not(#top) { padding-left: 22px !important; padding-right: 22px !important; padding-top: 72px !important; padding-bottom: 72px !important; }
    .twk-header { padding-left: 22px !important; padding-right: 22px !important; }
    .twk-mobile-menu { padding-left: 22px !important; padding-right: 22px !important; }
    .hero-grid { padding-left: 22px !important; padding-right: 22px !important; }
    .grid-2, .grid-3, .haltung-grid, .footer-grid { grid-template-columns: 1fr !important; }
    .grid-3 { gap: 16px !important; }
    .footer-grid { gap: 34px !important; }
    .methodik-grid { grid-template-columns: 1fr !important; }
    .proof-metrics { grid-template-columns: 1fr 1fr !important; gap: 32px 20px !important; }
    .tension-row { grid-template-columns: 1fr !important; gap: 4px !important; }
  }

  @keyframes twk-marquee { from { transform: translate3d(0,0,0); } to { transform: translate3d(-50%,0,0); } }
  .twk-logo-marquee { overflow: hidden; -webkit-mask-image: linear-gradient(to right, transparent, #000 7%, #000 93%, transparent); mask-image: linear-gradient(to right, transparent, #000 7%, #000 93%, transparent); }
  .twk-logo-track { display: flex; align-items: center; gap: 40px; width: max-content; animation: twk-marquee 26s linear infinite; will-change: transform; transform: translateZ(0); backface-visibility: hidden; -webkit-backface-visibility: hidden; }
  .twk-logo-track img { -webkit-transform: translateZ(0); transform: translateZ(0); }
  .twk-logo-marquee, .twk-logo-track { pointer-events: none; }
  .twk-logo-mobile { display: none; }
  @media (max-width: 720px) {
    .twk-logo-desktop { display: none; }
    .twk-logo-mobile { display: flex; flex-direction: column; gap: 14px; }
    .twk-logo-track { gap: 30px; animation-duration: 15s; }
    .twk-logo-track-b { animation-duration: 18.5s; }
  }
  @media (prefers-reduced-motion: reduce) { .twk-logo-track { animation: none; } }

  .twk-svc-card { transition: transform var(--dur-base) var(--ease-standard), box-shadow var(--dur-base) var(--ease-standard); }
  .twk-svc-card:hover { transform: translateY(-4px); box-shadow: 0 18px 48px rgba(0,0,0,0.22); }
  .twk-svc-card:hover .twk-svc-arrow { transform: translateX(4px); }
</style>

    const onNav = (id) => {
      const el = document.getElementById(id === 'top' ? 'top' : id);
      if (el) window.scrollTo({ top: id === 'top' ? 0 : el.offsetTop - 64, behavior: 'smooth' });
    };

    return (
      <React.Fragment>
        <Header onNav={onNav} acc={acc} />
        <Hero onNav={onNav} t={t} acc={acc} />
        <Problem acc={acc} />
        <Prinzipien acc={acc} />
        <Angebote acc={acc} />
        <Methodik acc={acc} />
        <Haltung acc={acc} />
        <Proof acc={acc} />
        <UeberDominik acc={acc} />
        <FAQ acc={acc} />
        <FinalCTA acc={acc} />
        <Footer acc={acc} />

        <TweaksPanel>
          <TweakSection label="Hero" />
          <TweakRadio label="Headline" value={t.heroHeadline}
                      options={['Klarheit', 'Muster', 'Zumutung']}
                      onChange={(v) => setTweak('heroHeadline', v)} />
          <TweakSection label="Marke" />
          <TweakRadio label="Akzentfarbe" value={t.accent}
                      options={['Gold', 'Sage']}
                      onChange={(v) => setTweak('accent', v)} />
          <TweakToggle label="Helm-Wasserzeichen" value={t.helm}
                       onChange={(v) => setTweak('helm', v)} />
        </TweaksPanel>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
  <script defer src="enhance.js"></script>
</body>
</html>
